function parseData(csv){
var lines = csv.trim().split("\n");
var rows = [];
for (var i=1;i<lines.length;i++){
var p = lines[i].split(",").map(Number);
if (p.length===5 && p.every(function(v){return !isNaN(v);})) rows.push({x:[p[0],p[1],p[2],p[3]], y:p[4]});
}
return rows;
}

var ALL = parseData(DATA_CSV);
var NF = 4;
var IDS = ["diameter","length","ram_weight","drop_height"];
var MINS = [Infinity,Infinity,Infinity,Infinity];
var MAXS = [-Infinity,-Infinity,-Infinity,-Infinity];
for (var i=0;i<ALL.length;i++){
for (var j=0;j<NF;j++){
if (ALL[i].x[j]<MINS[j]) MINS[j]=ALL[i].x[j];
if (ALL[i].x[j]>MAXS[j]) MAXS[j]=ALL[i].x[j];
}
}

function buildTree(rows, feats, target, depth, maxDepth, minLeaf){
function mean(a){ var s=0; for(var i=0;i<a.length;i++) s+=a[i]; return s/a.length; }
var ys = rows.map(function(r){return target[r];});
var node = { leaf:true, value:mean(ys) };
if (depth>=maxDepth || rows.length<2*minLeaf) return node;
var bestErr=Infinity, bestF=-1, bestT=0, bestL=null, bestR=null;
for (var f=0; f<NF; f++){
var vals = rows.map(function(r){return feats[r][f];}).slice().sort(function(a,b){return a-b;});
for (var vi=0; vi<vals.length-1; vi++){
var thr=(vals[vi]+vals[vi+1])/2;
var L=[],R=[];
for (var k=0;k<rows.length;k++){ if (feats[rows[k]][f]<=thr) L.push(rows[k]); else R.push(rows[k]); }
if (L.length<minLeaf || R.length<minLeaf) continue;
var lm=mean(L.map(function(r){return target[r];}));
var rm=mean(R.map(function(r){return target[r];}));
var err=0;
for (var k=0;k<L.length;k++){ var d=target[L[k]]-lm; err+=d*d; }
for (var k=0;k<R.length;k++){ var d=target[R[k]]-rm; err+=d*d; }
if (err<bestErr){ bestErr=err; bestF=f; bestT=thr; bestL=L; bestR=R; }
}
}
if (bestF===-1) return node;
return { leaf:false, feature:bestF, thr:bestT,
left:buildTree(bestL,feats,target,depth+1,maxDepth,minLeaf),
right:buildTree(bestR,feats,target,depth+1,maxDepth,minLeaf) };
}

function treePredict(node, x){
while(!node.leaf){ node = (x[node.feature]<=node.thr)? node.left : node.right; }
return node.value;
}

var MODEL = { base:0, trees:[], lr:0.08 };
function trainGBT(train){
var feats = train.map(function(r){return r.x;});
var y = train.map(function(r){return r.y;});
var base=0; for(var i=0;i<y.length;i++) base+=y[i]; base/=y.length;
MODEL.base=base;
MODEL.trees=[];
var pred = y.map(function(){return base;});
var N_TREES=150, MAX_DEPTH=4, MIN_LEAF=4;
for (var t=0;t<N_TREES;t++){
var resid=[]; var idx=[];
for (var i=0;i<y.length;i++){ resid.push(y[i]-pred[i]); idx.push(i); }
var tree=buildTree(idx, feats, resid, 0, MAX_DEPTH, MIN_LEAF);
MODEL.trees.push(tree);
for (var i=0;i<y.length;i++){ pred[i]+=MODEL.lr*treePredict(tree, feats[i]); }
}
}

function predict(x){
var p=MODEL.base;
for (var t=0;t<MODEL.trees.length;t++){ p+=MODEL.lr*treePredict(MODEL.trees[t], x); }
return p;
}

function shuffle(a, seed){
var s=seed||12345;
function rnd(){ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; }
var arr=a.slice();
for (var i=arr.length-1;i>0;i--){ var j=Math.floor(rnd()*(i+1)); var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp; }
return arr;
}

function evaluate(test){
var n=test.length, sy=0;
for (var i=0;i<n;i++) sy+=test[i].y;
var my=sy/n;
var ssRes=0, ssTot=0, absErr=0, sqErr=0, mape=0;
for (var i=0;i<n;i++){
var p=predict(test[i].x);
var e=test[i].y-p;
ssRes+=e*e;
ssTot+=(test[i].y-my)*(test[i].y-my);
absErr+=Math.abs(e);
sqErr+=e*e;
if (test[i].y!==0) mape+=Math.abs(e/test[i].y);
}
var r2=1-ssRes/ssTot;
return { r2:r2, r:Math.sqrt(Math.max(0,r2)), mae:absErr/n, rmse:Math.sqrt(sqErr/n), mape:100*mape/n };
}

function runTraining(){
var data=shuffle(ALL, 42);
var cut=Math.floor(data.length*0.8);
var train=data.slice(0,cut);
var test=data.slice(cut);
trainGBT(train);
var m=evaluate(test);
document.getElementById("m_r2").textContent=m.r2.toFixed(4);
document.getElementById("m_r").textContent=m.r.toFixed(4);
document.getElementById("m_mape").textContent=m.mape.toFixed(2);
document.getElementById("m_rmse").textContent=m.rmse.toFixed(2);
document.getElementById("m_mae").textContent=m.mae.toFixed(2);
trainGBT(ALL);
var st=document.getElementById("status");
st.textContent="Model trained on 359 dataset.";
document.getElementById("predictBtn").disabled=false;
}

function round2(v){ return Math.round(v*100)/100; }

for (var j=0;j<NF;j++){
var el=document.getElementById(IDS[j]);
el.min=MINS[j];
el.max=MAXS[j];
var mid=(MINS[j]+MAXS[j])/2;
el.value=round2(mid);
document.getElementById("hint_"+IDS[j]).textContent="Allowed range: "+round2(MINS[j])+" to "+round2(MAXS[j]);
}

document.getElementById("predictBtn").addEventListener("click", function(){
var r=document.getElementById("result");
var x=[]; var errors=[];
var labels=["Pile Diameter","Pile Length","Ram Weight","Drop Height"];
for (var j=0;j<NF;j++){
var raw=document.getElementById(IDS[j]).value;
var val=parseFloat(raw);
if (raw==="" || isNaN(val)){ errors.push(labels[j]+" is required."); x.push(NaN); continue; }
if (val<MINS[j] || val>MAXS[j]){ errors.push(labels[j]+" must be between "+round2(MINS[j])+" and "+round2(MAXS[j])+"."); }
x.push(val);
}
if (errors.length>0){
r.className="result warn"; r.style.display="block";
r.textContent=errors.join(" ");
return;
}
var p=predict(x);
if (p<0) p=0;
r.className="result"; r.style.display="block";
r.textContent="Predicted Pile Bearing Capacity: "+p.toFixed(2)+" kN";
});

setTimeout(runTraining, 50);
</script>
</body>
</html>
